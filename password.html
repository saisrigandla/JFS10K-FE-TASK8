<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Pattern</title>
</head>
<body>
    <form action="./log.html" >
    <center>
    <table width="30%">
      <tr>
        <td>
          <fieldset>
            <label for="phone">Password:</label>
            <br><br>
            <input type="password" id="phone" placeholder="Enter your password" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$" title="Password must be 8 characters long and include uppercase, lowercase, number, and special character" autocomplete="off" required>
            <br><br>
            <input type="submit">
          </fieldset>
        </td>
      </tr>
    </table>
    </center>
  </form>
</body>
</html>
